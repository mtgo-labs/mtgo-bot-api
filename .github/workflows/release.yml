name: Release

# Build cross-platform static binaries and publish a GitHub release whenever a
# `v*` tag is pushed. Mirrors the pageton/dbview release pipeline, simplified
# for pure-Go CGO_ENABLED=0 static binaries (no manylinux2014 Docker step
# needed) and adapted to mtgo-bot-api's cmd path + version var.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: mtgo-bot-api

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"   # tag is vX.Y.Z; version string is X.Y.Z
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          ARCHIVE="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${ARCHIVE}"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -buildvcs=false -trimpath \
            -ldflags="-s -w -X github.com/mtgo-labs/mtgo-bot-api/internal/version.Version=${VERSION}" \
            -o "dist/${ARCHIVE}/${APP_NAME}${{ matrix.ext }}" ./cmd/${APP_NAME}

          cp README.md "dist/${ARCHIVE}/"

          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -rq "${ARCHIVE}.zip" "${ARCHIVE}")
          else
            tar -C dist -czf "dist/${ARCHIVE}.tar.gz" "${ARCHIVE}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
